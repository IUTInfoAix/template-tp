# =====================================================================
# template-ci.yml — CI du méta-template TP
#
# Pour chaque feature et pack listés ci-dessous :
#   1. génère un TP avec la composition `answers.yml` (et son pendant
#      `answers-disabled.yml` quand il existe) ;
#   2. lance les tests Bats `validate.bats` (ou `validate-disabled.bats`)
#      qui exécutent l'idiomatique du langage cible (mvnw verify,
#      pmd:check, xvfb-run, etc.).
#
# Ajouter une nouvelle feature/pack = ajouter une entrée dans la matrice
# correspondante. Les compositions courantes (default, default-with-javafx,
# barebone...) seront ajoutées dans un job séparé une fois plus de
# features prêtes.
# =====================================================================

name: template-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  meta-checks:
    name: meta / sync TDD-PLAYBOOK (.jinja)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bloc TDD-PLAYBOOK identique entre AGENTS.md.jinja et copilot-instructions.md.jinja
        # Garde-fou : empêche un commit qui modifierait le bloc dans un seul
        # des 2 fichiers. Doublon volontaire avec features/ai-tutor/test/
        # validate.bats (qui teste sur le TP généré) - ici on sécurise la
        # source AVANT génération, donc on échoue plus tôt.
        run: |
          AGENTS=.copier-template/AGENTS.md.jinja
          COPILOT=.copier-template/.github/copilot-instructions.md.jinja
          extract() {
            sed -n '/<!-- TDD-PLAYBOOK-START -->/,/<!-- TDD-PLAYBOOK-END -->/p' "$1"
          }
          diff -u <(extract "$AGENTS") <(extract "$COPILOT")

  test-feature-isolated:
    name: feature/${{ matrix.feature }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          - lint-quality
          - dependabot
          - issue-templates
          - codeowners
          - vscode-config
          - devcontainer
          - ai-tutor
          - maven-ci
          - pre-commit-spotless
          - autograding-classroom
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "zulu"
          # Pas de cache: maven : le repo méta-template n'a pas de pom.xml
          # à la racine (le pom est un .jinja dans .copier-template/). Le
          # cache Maven sert dans les TPs générés, pas ici.

      - name: Install copier + bats
        run: |
          pip install copier pyyaml
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Generate TP with feature ${{ matrix.feature }} ENABLED
        run: |
          rm -rf /tmp/tp-${{ matrix.feature }}
          copier copy --trust --defaults \
            --data-file features/${{ matrix.feature }}/test/answers.yml \
            . /tmp/tp-${{ matrix.feature }}

      - name: Bats — feature enabled
        env:
          TP_DIR: /tmp/tp-${{ matrix.feature }}
        run: bats features/${{ matrix.feature }}/test/validate.bats

      - name: Generate TP with feature ${{ matrix.feature }} DISABLED
        if: hashFiles(format('features/{0}/test/answers-disabled.yml', matrix.feature)) != ''
        run: |
          rm -rf /tmp/tp-no-${{ matrix.feature }}
          copier copy --trust --defaults \
            --data-file features/${{ matrix.feature }}/test/answers-disabled.yml \
            . /tmp/tp-no-${{ matrix.feature }}

      - name: Bats — feature disabled (négation)
        if: hashFiles(format('features/{0}/test/validate-disabled.bats', matrix.feature)) != ''
        env:
          TP_DIR: /tmp/tp-no-${{ matrix.feature }}
        run: bats features/${{ matrix.feature }}/test/validate-disabled.bats

  test-composition-spotless-with-lint:
    name: composition / pre-commit-spotless + lint-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "zulu"
      - name: Install copier + bats
        run: |
          pip install copier pyyaml
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats
      - name: Generate TP with spotless + lint-quality
        run: |
          rm -rf /tmp/tp-spot-lint
          copier copy --trust --defaults \
            --data-file features/pre-commit-spotless/test/answers-with-lint.yml \
            . /tmp/tp-spot-lint
      - name: Bats — composition spotless + lint
        env:
          TP_DIR: /tmp/tp-spot-lint
        run: bats features/pre-commit-spotless/test/validate-with-lint.bats
