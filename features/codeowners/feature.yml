name: codeowners
type: feature
description: |
  Fichier .github/CODEOWNERS : auto-assigne le `module.codeowner` comme
  reviewer sur toutes les PRs ouvertes dans le repo. Utile sur les TPs
  avec plusieurs encadrants ou pour notifier l'enseignant des PRs
  étudiantes (Group Assignment TP3).

  Auto-assigne le `module.codeowner` comme reviewer sur toutes les PRs. Cohérent avec l'ancien R203/template-tp-java qui posait toujours ce fichier.
default: true
