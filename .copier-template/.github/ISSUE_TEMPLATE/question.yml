name: ❓ Question sur un exercice
description: Tu n'es pas bloqué techniquement, tu cherches à comprendre un concept ou un énoncé
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Avant de poser ta question, vérifie que tu as bien **lu l'énoncé** et **essayé** d'activer le premier test rouge. Ça aide à cibler la question.

  - type: input
    id: exercise
    attributes:
      label: Exercice concerné
      description: Numéro / nom du sous-paquet
      placeholder: exercice3
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Ce que tu essaies de faire
    validations:
      required: true

  - type: textarea
    id: stuck
    attributes:
      label: Ce que tu ne comprends pas (ou ce qui bloque)
    validations:
      required: true
