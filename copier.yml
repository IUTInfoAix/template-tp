# =====================================================================
# copier.yml — méta-template TP IUT Aix-Marseille
#
# Génère un TP Java (+ optionnellement JavaFX) à partir d'une composition
# de features modulaires. Voir TEMPLATE.md pour l'usage.
# =====================================================================

_subdirectory: .copier-template
_templates_suffix: .jinja
_min_copier_version: "9.0.0"

_answers_file: .copier-answers.yml

_exclude:
  - "*.bak"
  - "**/__pycache__"
  - ".git"
  # ----- Inclusion conditionnelle par feature (les expressions vides
  # n'excluent rien ; les non-vides excluent le path nommé). -----
  # lint-quality
  - "{% if 'lint-quality' not in stack.features %}pmd-ruleset.xml{% endif %}"
  - "{% if 'lint-quality' not in stack.features %}scripts/lint-doc-coherence.sh{% endif %}"
  - "{% if 'lint-quality' not in stack.features %}.github/workflows/lint.yml{% endif %}"
  # dependabot
  - "{% if 'dependabot' not in stack.features %}.github/dependabot.yml{% endif %}"
  # issue-templates (le dossier ENTIER + ses 3 fichiers)
  - "{% if 'issue-templates' not in stack.features %}.github/ISSUE_TEMPLATE{% endif %}"
  - "{% if 'issue-templates' not in stack.features %}.github/ISSUE_TEMPLATE/**{% endif %}"
  # codeowners (default OFF, donc on l'exclut quand absent)
  - "{% if 'codeowners' not in stack.features %}.github/CODEOWNERS{% endif %}"
  # vscode-config (dossier entier)
  - "{% if 'vscode-config' not in stack.features %}.vscode{% endif %}"
  - "{% if 'vscode-config' not in stack.features %}.vscode/**{% endif %}"
  # devcontainer
  - "{% if 'devcontainer' not in stack.features %}.devcontainer{% endif %}"
  - "{% if 'devcontainer' not in stack.features %}.devcontainer/**{% endif %}"
  # ai-tutor (AGENTS.md générique + copilot-instructions.md ; le bloc
  # TDD-PLAYBOOK doit rester synchronisé entre les deux, vérifié par bats)
  - "{% if 'ai-tutor' not in stack.features %}AGENTS.md{% endif %}"
  - "{% if 'ai-tutor' not in stack.features %}.github/copilot-instructions.md{% endif %}"
  # maven-ci
  - "{% if 'maven-ci' not in stack.features %}.github/workflows/maven.yml{% endif %}"
  # pre-commit-spotless (le hook est exclu si la feature n'est pas active ;
  # le pom est déjà conditionnel pour les plugins spotless + git-build-hook)
  - "{% if 'pre-commit-spotless' not in stack.features %}.githooks{% endif %}"
  - "{% if 'pre-commit-spotless' not in stack.features %}.githooks/**{% endif %}"
  # autograding-classroom (workflow + 2 scripts dans scripts/)
  - "{% if 'autograding-classroom' not in stack.features %}.github/workflows/classroom.yml{% endif %}"
  - "{% if 'autograding-classroom' not in stack.features %}scripts/grade-test.sh{% endif %}"
  - "{% if 'autograding-classroom' not in stack.features %}scripts/update-autograding.sh{% endif %}"
  # generate-student (workflow + script dans scripts/)
  - "{% if 'generate-student' not in stack.features %}.github/workflows/generate-student.yml{% endif %}"
  - "{% if 'generate-student' not in stack.features %}scripts/generate-student.sh{% endif %}"
  # pack javafx : Dockerfile + ressources JavaFX. Le pom + devcontainer +
  # maven.yml sont déjà conditionnels via Jinja blocs ; App.java +
  # AppTest.java basculent sur la version JavaFX via if/else.
  - "{% if 'javafx' not in stack.packs %}.devcontainer/Dockerfile{% endif %}"
  - "{% if 'javafx' not in stack.packs %}src/main/resources/DarkTheme.css{% endif %}"
  - "{% if 'javafx' not in stack.packs %}src/main/java/module-info.java{% endif %}"
  # NB : les screenshots Codespace vivent désormais dans .github/assets/
  # (toujours posés, référencés par le README) au lieu de
  # src/main/resources/assets/ (qui était excluded hors pack javafx et
  # produisait des liens cassés dans le README sur les TPs sans javafx).

_tasks:
  # Passer features+packs en arguments shell évite à validate_deps.py de
  # devoir relire le .copier-answers.yml (qui n'est pas garanti écrit
  # avant les tasks).
  - "python3 {{ _copier_conf.src_path }}/scripts/validate_deps.py --features '{{ stack.features|join(',') }}' --packs '{{ stack.packs|join(',') }}'"
  # Régénère le bloc autograding du workflow Classroom à partir des
  # exercices détectés dans src/test/. Indispensable après chaque
  # `copier copy`/`update` pour que le workflow corresponde aux exercices
  # réels du TP. No-op silencieux si le script est absent (autograding-
  # classroom non actif) ; une erreur d'exécution du script remonte bien
  # (pas de `|| true` final qui masquerait un script cassé).
  - "if [ -x ./scripts/update-autograding.sh ]; then ./scripts/update-autograding.sh; fi"

# =====================================================================
# Stratégie infra vs contenu pédagogique :
#
# Les fichiers ci-dessous sont GÉNÉRÉS à la création initiale (`copier
# copy`) mais JAMAIS écrasés par un `copier update` ultérieur. Ce sont
# des fichiers de contenu pédagogique que l'enseignant·e personnalise
# par TP (énoncés, src d'exercices, README riche). Tous les autres
# fichiers (workflows, devcontainer, .vscode, scripts d'infra,
# pom.xml...) sont mis à jour normalement à chaque `copier update`.
#
# Le pom.xml est délibérément hors de cette liste : on veut que les
# bumps de versions de plugins se propagent. Les rares cas où un TP a
# une dep spécifique (ex: tp4 R203 + Gilded Rose) sont à ré-appliquer
# manuellement après un `copier update` qui les écraserait.
# =====================================================================
_skip_if_exists:
  # README de TP : squelette pédagogique (objectifs Bloom, prérequis,
  # sections exercices) entièrement personnalisé par l'enseignant·e.
  - README.md
  # Sources et tests d'exercices (par convention, sous-paquets exerciceN/
  # et bonusN/). Le contenu est l'essence pédagogique du TP.
  - src/main/java/fr/univ_amu/iut/exercice*/**
  - src/test/java/fr/univ_amu/iut/exercice*/**
  - src/main/java/fr/univ_amu/iut/bonus*/**
  - src/test/java/fr/univ_amu/iut/bonus*/**
  # Ressources d'exercices (notamment ApprovalTests *.approved.txt).
  - src/main/resources/exercice*/**
  - src/test/resources/exercice*/**
  - src/test/resources/bonus*/**
  # App.java et AppTest.java NE SONT PAS dans cette liste, à dessein :
  # ils sont conditionnels sur `stack.packs` (version console vs JavaFX),
  # et un changement de pack via `copier update` doit pouvoir les
  # régénérer. Conséquence : si l'enseignant·e a ajouté des entrées au
  # menu (`exercices.put(...)`), un `copier update` les écrase. Pratique
  # recommandée : commit avant `copier update`, vérifier `git diff`,
  # cherry-pick à la main les ajouts au menu.

# =====================================================================
# Questions interactives
# =====================================================================

module:
  type: yaml
  multiline: true
  default:
    code: "R2.XX"
    titre: "À remplir"
    org_github: "IUTInfoAix-RXXX"
    classroom_org: "IUTInfoAix-RXXX-2026"
    codeowner: "@nedseb"
    contact_email: "sebastien.nedjar@univ-amu.fr"
  help: |
    Métadonnées du module pédagogique (R2.02, R2.03...).
    Format YAML inline. Exemple :
      {code: "R2.03", titre: "Qualité de développement",
       org_github: "IUTInfoAix-R203",
       classroom_org: "IUTInfoAix-R203-2026",
       codeowner: "@nedseb",
       contact_email: "sebastien.nedjar@univ-amu.fr"}

tp:
  type: yaml
  multiline: true
  default:
    numero: 1
    titre_court: "tp1"
    titre_complet: "TP1"
    description: "À remplir"
    classroom_link: "https://classroom.github.com/a/XXXXXX"
  help: |
    Métadonnées du TP. titre_court devient l'artifactId Maven
    (snake_case ou kebab, sans espaces).

stack:
  type: yaml
  multiline: true
  default:
    java_version: 25
    features:
      - devcontainer
      - vscode-config
      - ai-tutor
      - autograding-classroom
      - generate-student
      - lint-quality
      - pre-commit-spotless
      - maven-ci
      - dependabot
      - issue-templates
      - codeowners
    packs: []
    autograding_mode: tdd
  help: |
    Composition technique du TP : version Java, features actives,
    packs langage-spécifiques (ex: javafx), mode d'autograding (tdd
    ou refactoring).
